#
# nRF54L15: Trusted storage for mesh requires SETTINGS_ZMS (NVS is not a valid
# backend for TRUSTED_STORAGE on SOC_SERIES_NRF54LX). See nrf/subsys/trusted_storage/Kconfig.
#

# Nordic SoftDevice Controller (Zephyr LL SW Split is unsupported for NCS mesh + SDC).
CONFIG_BT_LL_SOFTDEVICE=y
CONFIG_BT_LL_SW_SPLIT=n

CONFIG_SOC_FLASH_NRF_PARTIAL_ERASE=n
CONFIG_NVS=n
CONFIG_NVS_LOOKUP_CACHE=n
CONFIG_SETTINGS_NVS_NAME_CACHE=n
CONFIG_ZMS=y
CONFIG_SETTINGS_ZMS_CUSTOM_SECTOR_COUNT=y
CONFIG_SETTINGS_ZMS_SECTOR_COUNT=8
CONFIG_ZMS_LOOKUP_CACHE=y
CONFIG_ZMS_LOOKUP_CACHE_SIZE=512
CONFIG_ZMS_LOOKUP_CACHE_FOR_SETTINGS=y

# Align stack sizes with other Nordic mesh samples on this SoC
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4800
CONFIG_BT_RX_STACK_SIZE=5120
CONFIG_BT_MESH_SETTINGS_WORKQ_STACK_SIZE=1800
