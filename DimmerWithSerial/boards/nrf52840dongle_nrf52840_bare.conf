# Board overlay for nRF52840 Dongle flashed via SWD (no nRF5 USB bootloader).
# Enables the Zephyr shell over USB CDC ACM on the dongle's USB port.
# SHELL_BACKEND_SERIAL_INIT_PRIORITY=51 must be lower than the SYS_INIT
# priority in usb_cdc_line_state.c (52), so the shell backend is ready before
# the line state handler registers its callback.

CONFIG_BOARD_SERIAL_BACKEND_CDC_ACM=y
CONFIG_SHELL_BACKEND_SERIAL_INIT_PRIORITY=51
CONFIG_USBD_CDC_ACM_WORKQUEUE=y
CONFIG_USBD_CDC_ACM_STACK_SIZE=2048
CONFIG_UDC_BUF_POOL_SIZE=16384
CONFIG_CDC_ACM_SERIAL_MANUFACTURER_STRING="Nordic Semiconductor ASA"
CONFIG_CDC_ACM_SERIAL_PRODUCT_STRING="DimmerWithSerial"
